<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Pro - Team View</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #eee; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 450px; margin: 20px auto; }
        input, textarea, select { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #222; color: #fff; border: 1px solid #444; }
        button { cursor: pointer; background: #c62828; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin: 5px; }
        .hidden { display: none; }
        .player-row { background: #252525; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        #roleBox { font-size: 20px; padding: 15px; border: 2px solid #fbc02d; border-radius: 10px; background: rgba(251, 192, 45, 0.1); }
        .mafia-team { background: rgba(198, 40, 40, 0.2); border: 1px solid #c62828; padding: 10px; margin-top: 10px; border-radius: 8px; color: #ff8a80; }
    </style>
</head>
<body>

    <div id="setupArea" class="card">
        <h2>🕵️‍♂️ مافیای پێشکەوتوو</h2>
        <input type="text" id="userName" placeholder="ناوی خۆت">
        <button onclick="showHost()">Host (گاد)</button>
        <button onclick="showJoin()" style="background:#2e7d32">Join (یاریزان)</button>
    </div>

    <div id="hostArea" class="card hidden">
        <h3>کۆدی ژوور: <span id="roomDisplay" style="color:#fbc02d">....</span></h3>
        <textarea id="rolesInput" rows="2">مافیا، مافیا، مافیا، دکتۆر، پۆلیس، هاوڵاتی</textarea>
        <div id="playerList"></div>
        <button onclick="assignRoles()" style="background:#1565c0; width:100%; margin-top:10px;">🎲 دابەشکردنی ڕۆڵەکان</button>
    </div>

    <div id="joinArea" class="card hidden">
        <div id="inputPart">
            <input type="number" id="roomCode" placeholder="کۆدی ژوور">
            <button onclick="joinRoom()">بچۆ ژوورەوە</button>
        </div>
        <div id="statusMsg" style="color:#fbc02d; margin:10px;"></div>
        <div id="roleDisplay" class="hidden">
            <div id="roleBox"></div>
            <div id="mafiaList" class="mafia-team hidden"></div>
            <div id="actionBox" class="hidden" style="margin-top:10px; padding:10px; border:1px dashed #fff;"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDzASH3my7ynrQrxAL_rqVXxElL4dDcuyA",
        authDomain: "mafia-game-57dd4.firebaseapp.com",
        projectId: "mafia-game-57dd4",
        databaseURL: "https://mafia-game-57dd4-default-rtdb.firebaseio.com/",
        storageBucket: "mafia-game-57dd4.firebasestorage.app",
        messagingSenderId: "861452068901",
        appId: "1:861452068901:web:db81321e9065f5ce1377cc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = null; let myName = ""; let myId = "";

    function showHost() {
        myName = document.getElementById('userName').value; if(!myName) return alert("ناو بنووسە");
        currentRoom = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('roomDisplay').innerText = currentRoom;
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('hostArea').classList.remove('hidden');
        db.ref('rooms/' + currentRoom).set({ exists: true });
        db.ref('rooms/' + currentRoom + '/players').on('value', (s) => {
            let h = ""; const p = s.val() || {};
            Object.keys(p).forEach(id => {
                h += `<div class="player-row"><span>${p[id].name} ${p[id].status==='out'?'(دەرکرا)':''}</span>
                <div><button style="background:orange; font-size:10px;" onclick="kick('${id}',true)">🗳️ کارت</button>
                <button style="background:gray; font-size:10px;" onclick="kick('${id}',false)">🔫 تەقە</button></div></div>`;
            });
            document.getElementById('playerList').innerHTML = h;
        });
    }

    function showJoin() {
        myName = document.getElementById('userName').value; if(!myName) return alert("ناو بنووسە");
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('joinArea').classList.remove('hidden');
    }

    function joinRoom() {
        const code = document.getElementById('roomCode').value;
        db.ref('rooms/' + code).once('value', (snap) => {
            if(!snap.exists()) return alert("ژوورەکە نییە!");
            currentRoom = code;
            const ref = db.ref('rooms/' + code + '/players').push();
            myId = ref.key;
            ref.set({ name: myName, role: "waiting", status: "alive", card: "" });
            document.getElementById('inputPart').classList.add('hidden');

            ref.on('value', (s) => {
                const d = s.val(); if(!d) return;
                document.getElementById('roleDisplay').classList.remove('hidden');
                
                if(d.status === "alive") {
                    document.getElementById('roleBox').innerHTML = "ڕۆڵەکەت: <b>" + d.role + "</b>";
                    // ئەگەر مافیا بوو، هاوڕێکانی نیشان بدە
                    if(d.role === "مافیا") {
                        showMafiaTeammates();
                    } else {
                        document.getElementById('mafiaList').classList.add('hidden');
                    }
                } else {
                    document.getElementById('roleBox').innerHTML = "<span style='color:red'>دەرکرایت!</span><br>کارت: " + (d.card || "تەقە");
                    document.getElementById('mafiaList').classList.add('hidden');
                    if(d.card === "فەیـس ئۆف") showFaceOff(d.role);
                }
            });
        });
    }

    function showMafiaTeammates() {
        db.ref('rooms/' + currentRoom + '/players').once('value', (s) => {
            const ps = s.val(); let names = [];
            Object.keys(ps).forEach(id => {
                if(ps[id].role === "مافیا" && id !== myId) names.push(ps[id].name);
            });
            const listDiv = document.getElementById('mafiaList');
            if(names.length > 0) {
                listDiv.innerHTML = "👥 مافیاکانی تر: " + names.join(' - ');
                listDiv.classList.remove('hidden');
            } else {
                listDiv.innerHTML = "تۆ تەنها مافیای!";
                listDiv.classList.remove('hidden');
            }
        });
    }

    function assignRoles() {
        db.ref('rooms/' + currentRoom + '/players').once('value', (s) => {
            const p = s.val(); const ids = Object.keys(p);
            const r = document.getElementById('rolesInput').value.split('،').map(x => x.trim());
            let sh = r.sort(() => Math.random() - 0.5);
            ids.forEach((id, i) => db.ref('rooms/' + currentRoom + '/players/' + id).update({ role: sh[i] || "هاوڵاتی", status: "alive", card: "" }));
            alert("ڕۆڵەکان نێردران!");
        });
    }

    function kick(id, c) {
        const cards = ["فەیـس ئۆف", "مێشکی زیرەک", "کەلەپچە", "ئاشکراکردن"];
        let sel = c ? cards[Math.floor(Math.random()*cards.length)] : "";
        db.ref('rooms/' + currentRoom + '/players/' + id).update({ status: "out", card: sel });
    }

    function showFaceOff(old) {
        const box = document.getElementById('actionBox'); box.classList.remove('hidden');
        box.innerHTML = `<select id="tP"></select><button onclick="execFO('${old}')">ناردنی ڕۆڵ</button>`;
        db.ref('rooms/' + currentRoom + '/players').once('value', (s) => {
            let h = ""; Object.keys(s.val()).forEach(id => { if(id!==myId) h+=`<option value="${id}">${s.val()[id].name}</option>`; });
            document.getElementById('tP').innerHTML = h;
        });
    }
    function execFO(old) {
        const t = document.getElementById('tP').value;
        db.ref('rooms/' + currentRoom + '/players/' + t).update({ role: old });
        alert("گواسترایەوە!"); document.getElementById('actionBox').classList.add('hidden');
    }
</script>
</body>
</html>
