<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مافیای کوردی</title>
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/9Hk2mbHV/image.png">
    <link rel="icon" type="image/png" href="https://i.ibb.co/9Hk2mbHV/image.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #0d1117; 
            background-image: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
            color: #c9d1d9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 480px; background: #161b22; padding: 25px; border-radius: 20px; border: 1px solid #30363d; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .logo-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #f85149; margin-bottom: 15px; box-shadow: 0 0 20px rgba(248, 81, 73, 0.4); object-fit: cover; }
        h2 { color: #f85149; margin-bottom: 25px; text-align: center; font-size: 28px; }
        input, textarea, select { width: 95%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #0d1117; color: #fff; border: 1px solid #30363d; font-size: 16px; }
        button { width: 100%; cursor: pointer; background: #238636; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; margin: 10px 0; transition: 0.2s; }
        button:hover { background: #2ea043; transform: scale(1.02); }
        .btn-host { background: #1f6feb; }
        .player-item { background: #21262d; padding: 12px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #58a6ff; }
        .role-box { font-size: 26px; padding: 25px; border: 3px solid #d29922; border-radius: 15px; background: rgba(210, 153, 34, 0.1); color: #e3b341; margin: 20px 0; font-weight: bold; text-align: center;}
        .hidden { display: none; }
        .mafia-info { background: rgba(248, 81, 73, 0.1); border: 1px solid #f85149; padding: 12px; border-radius: 10px; color: #ffa19a; margin-top: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="setupArea" style="text-align: center;">
            <img src="https://i.ibb.co/9Hk2mbHV/image.png" alt="Mafia Logo" class="logo-img">
            <h2>🕵️‍♂️ مافیای ئۆنلاین</h2>
            <input type="text" id="userName" placeholder="ناوی خۆت بنووسە">
            <button class="btn-host" onclick="playSound('click'); showHost()">دروستکردنی ژوور (Host)</button>
            <button onclick="playSound('click'); showJoin()">چوونە ژوورەوە (Join)</button>
        </div>

        <div id="hostArea" class="hidden">
            <h3 style="text-align:center;">🏠 کۆدی ژوور: <span id="roomDisplay" style="color:#d29922; font-size: 32px;">....</span></h3>
            <textarea id="rolesInput" rows="2">مافیا، مافیا، مافیا، دکتۆر، پۆلیس، هاوڵاتی، هاوڵاتی</textarea>
            <div id="playerList"></div>
            <button class="btn-host" onclick="playSound('alert'); assignRoles()" style="margin-top: 20px;">🎲 دابەشکردنی ڕۆڵەکان</button>
        </div>

        <div id="joinArea" class="hidden">
            <div id="inputPart">
                <input type="number" id="roomCode" placeholder="کۆدی ژوور">
                <button onclick="playSound('click'); joinRoom()">داخڵبوون</button>
            </div>
            <div id="statusMsg" style="color:#d29922; margin: 15px 0; text-align: center;"></div>
            <div id="roleDisplay" class="hidden">
                <div id="roleBox" class="role-box"></div>
                <div id="mafiaList" class="mafia-info hidden"></div>
                <div id="actionBox" class="hidden" style="margin-top:20px; padding:15px; border:1px dashed #fff; border-radius: 12px;"></div>
            </div>
        </div>
    </div>

<script>
    const sounds = {
        click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
        alert: new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'),
        gun: new Audio('https://www.soundjay.com/mechanical/gun-gunshot-01.mp3'),
        card: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3')
    };

    function playSound(name) {
        sounds[name].currentTime = 0;
        sounds[name].play().catch(e => {});
    }

    const firebaseConfig = {
        apiKey: "AIzaSyDzASH3my7ynrQrxAL_rqVXxElL4dDcuyA",
        authDomain: "mafia-game-57dd4.firebaseapp.com",
        projectId: "mafia-game-57dd4",
        databaseURL: "https://mafia-game-57dd4-default-rtdb.firebaseio.com/",
        storageBucket: "mafia-game-57dd4.firebasestorage.app",
        messagingSenderId: "861452068901",
        appId: "1:861452068901:web:db81321e9065f5ce1377cc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentRoom = null; let myName = ""; let myId = "";

    function showHost() {
        myName = document.getElementById('userName').value; if(!myName) return alert("سەرەتا ناو بنووسە");
        currentRoom = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('roomDisplay').innerText = currentRoom;
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('hostArea').classList.remove('hidden');
        db.ref('rooms/' + currentRoom).set({ exists: true });
        db.ref('rooms/' + currentRoom + '/players').on('value', (s) => {
            let h = ""; const p = s.val() || {};
            Object.keys(p).forEach(id => {
                h += `<div class="player-item"><span>👤 ${p[id].name} ${p[id].status==='out'?'(❌)':''}</span>
                <div><button style="background:orange; padding:6px; border-radius:8px; border:none; color:white; cursor:pointer;" onclick="playSound('card'); kick('${id}',true)">🗳️ کارت</button>
                <button style="background:#555; padding:6px; border-radius:8px; border:none; color:white; cursor:pointer;" onclick="playSound('gun'); kick('${id}',false)">🔫 تەقە</button></div></div>`;
            });
            document.getElementById('playerList').innerHTML = h;
        });
    }

    function showJoin() {
        myName = document.getElementById('userName').value; if(!myName) return alert("سەرەتا ناو بنووسە");
        document.getElementById('setupArea').classList.add('hidden');
        document.getElementById('joinArea').classList.remove('hidden');
    }

    function joinRoom() {
        const code = document.getElementById('roomCode').value;
        db.ref('rooms/' + code).once('value', (snap) => {
            if(!snap.exists()) return alert("کۆدەکە هەڵەیە!");
            currentRoom = code;
            const ref = db.ref('rooms/' + code + '/players').push();
            myId = ref.key;
            ref.set({ name: myName, role: "waiting", status: "alive" });
            document.getElementById('inputPart').classList.add('hidden');
            ref.on('value', (s) => {
                const d = s.val(); if(!d) return;
                document.getElementById('roleDisplay').classList.remove('hidden');
                if(d.status === "alive") {
                    document.getElementById('roleBox').innerHTML = "ڕۆڵەکەت:<br>" + d.role;
                    if(d.role === "مافیا") showMafiaTeammates();
                } else {
                    document.getElementById('roleBox').innerHTML = "<span style='color:#f85149'>تۆ دەرکرایت!</span><br><small style='font-size:16px'>کارت: " + (d.card || "بە تەقە") + "</small>";
                    document.getElementById('mafiaList').classList.add('hidden');
                }
            });
        });
    }

    function assignRoles() {
        db.ref('rooms/' + currentRoom + '/players').once('value', (s) => {
            const ids = Object.keys(s.val());
            const r = document.getElementById('rolesInput').value.split('،').map(x => x.trim());
            let sh = r.sort(() => Math.random() - 0.5);
            ids.forEach((id, i) => db.ref('rooms/' + currentRoom + '/players/' + id).update({ role: sh[i] || "هاوڵاتی", status: "alive", card: "" }));
        });
    }

    function kick(id, c) {
        const cards = ["فەیـس ئۆف", "مێشکی زیرەک", "کەلەپچە (بێدەنگی)", "ئاشکراکردنی ڕۆڵ"];
        let sel = c ? cards[Math.floor(Math.random()*cards.length)] : "";
        db.ref('rooms/' + currentRoom + '/players/' + id).update({ status: "out", card: sel });
    }

    function showMafiaTeammates() {
        db.ref('rooms/' + currentRoom + '/players').once('value', (s) => {
            const ps = s.val(); let names = [];
            Object.keys(ps).forEach(id => { if(ps[id].role === "مافیا" && id !== myId) names.push(ps[id].name); });
            const listDiv = document.getElementById('mafiaList');
            if(names.length > 0) {
                listDiv.innerHTML = "👥 هاوڕێ مافیاکانت: " + names.join(' - ');
                listDiv.classList.remove('hidden');
            }
        });
    }
</script>
</body>
</html>
