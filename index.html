<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Admin - وێبسایتی تایبەتی من</title>
    <style>
        /* لێرە ستایلی وێبسایتەکە دەستپێدەکات */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0d0d0d; color: #fff; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .section { background: #161616; margin: 15px 5px; padding: 20px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h3 { color: #e74c3c; margin-top: 0; }
        textarea, input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; }
        button { cursor: pointer; background-color: #e74c3c; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .btn-main { background-color: #27ae60; width: 90%; font-size: 18px; margin: 20px 0; }
        .player-card { background: #222; margin: 10px 0; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid #e74c3c; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dead { opacity: 0.3; filter: grayscale(1); }
        #cardPopup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f1c40f; color: #000; padding: 30px; border-radius: 20px; width: 80%; z-index: 1000; box-shadow: 0 0 30px rgba(241, 196, 15, 0.4); font-size: 20px; font-weight: bold; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
    </style>
</head>
<body>

<div class="container">
    <div id="cardPopup"></div>
    <div class="overlay" onclick="closePopup()"></div>

    <div class="section">
        <h3>👤 زیادکردنی یاریزان</h3>
        <input type="text" id="pInput" placeholder="ناوی یاریزان لێرە بنووسە...">
        <button onclick="addPlayer()">زیادکردن +</button>
    </div>

    <div class="section">
        <h3>🎭 ڕۆڵەکان</h3>
        <textarea id="rolesInput" rows="3">مافیا، مافیا، پۆلیس، دکتۆر، هاوڵاتی، هاوڵاتی</textarea>
    </div>

    <div class="section">
        <h3>🃏 کارتەکان</h3>
        <textarea id="cardsInput" rows="3">تەقەی کۆتایی، بێدەنگی، ناسنامەی ساختە، گۆڕینەوە، زیندووبوونەوە</textarea>
    </div>

    <button class="btn-main" onclick="startGame()">🏁 دەستپێکردنی یاری</button>

    <div id="playerList"></div>
</div>

<script>
    let players = [];

    function addPlayer() {
        let name = document.getElementById('pInput').value.trim();
        if(name) {
            players.push({ name: name, role: '؟', alive: true });
            document.getElementById('pInput').value = '';
            render();
        }
    }

    function startGame() {
        let rolesArr = document.getElementById('rolesInput').value.split('،').map(r => r.trim());
        if(players.length === 0) return alert("هیچ یاریزانێک نییە!");
        if(rolesArr.length < players.length) return alert("ڕۆڵەکان کەمترن لە یاریزانەکان!");

        let shuffled = [...rolesArr].sort(() => Math.random() - 0.5);
        players.forEach((p, i) => {
            p.role = shuffled[i];
            p.alive = true;
        });
        render();
    }

    function killPlayer(index) {
        if(players[index].alive) {
            players[index].alive = false;
            showRandomCard(players[index].name);
        } else {
            players[index].alive = true;
        }
        render();
    }

    function showRandomCard(name) {
        let cardsArr = document.getElementById('cardsInput').value.split('،').map(c => c.trim());
        let randomCard = cardsArr[Math.floor(Math.random() * cardsArr.length)];
        document.getElementById('cardPopup').innerHTML = "یاریزان: " + name + "<br><br>🎴 کارتەکەی:<br>" + randomCard;
        document.getElementById('cardPopup').style.display = 'block';
        document.querySelector('.overlay').style.display = 'block';
    }

    function closePopup() {
        document.getElementById('cardPopup').style.display = 'none';
        document.querySelector('.overlay').style.display = 'none';
    }

    function render() {
        let html = '';
        players.forEach((p, i) => {
            html += `<div class="player-card ${p.alive ? '' : 'dead'}">
                <span><b>${p.name}</b><br><small>ڕۆڵ: ${p.role}</small></span>
                <button onclick="killPlayer(${i})">${p.alive ? 'دەرکردن' : 'زیندووکردن'}</button>
            </div>`;
        });
        document.getElementById('playerList').innerHTML = html;
    }
</script>

</body>
</html>
