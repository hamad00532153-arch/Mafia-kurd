<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA ULTRA - FINAL VERSION</title>

    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --accent: #00f2ff; --bg: #02030a; --card: rgba(0,0,0,0.7); }
        
        /* 🌌 ANIMATED GRID BACKGROUND */
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; height: 100vh; }
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%; z-index: -1;
            background: linear-gradient(#00f2ff11 1px, transparent 1px), linear-gradient(90deg, #00f2ff11 1px, transparent 1px);
            background-size: 50px 50px; animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { from { transform: translate(0,0); } to { transform: translate(-100px,-100px); } }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 💎 GLASS CARD */
        .main-card { 
            width: 100%; max-width: 420px; background: var(--card); backdrop-filter: blur(20px);
            border-radius: 35px; padding: 30px; border: 1px solid #00f2ff44; 
            text-align: center; box-shadow: 0 0 30px rgba(0,242,255,0.2); margin-top: 20px;
        }

        .logo { font-size: 32px; font-weight: 900; background: linear-gradient(90deg, #00f2ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }

        input, textarea, select { width: 90%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        
        button { 
            width: 100%; padding: 16px; margin: 8px 0; border-radius: 20px; border: none; 
            background: linear-gradient(45deg, #00f2ff, #0066ff); color: white; font-weight: 900; 
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,242,255,0.4); transition: 0.3s;
        }
        button:active { transform: scale(0.95); }

        .role-display { font-size: 35px; color: var(--accent); font-weight: 900; margin: 20px 0; text-shadow: 0 0 20px var(--accent); }
        #chatBox { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 10px; margin: 15px 0; border: 1px solid #222; text-align: right; }
        
        .player-tag { display: inline-block; padding: 8px 12px; margin: 4px; background: #111; border-radius: 10px; border: 1px solid #333; font-size: 13px; }
        .hidden { display: none; }
        .glitch { animation: glitchEffect 0.2s infinite; }
        @keyframes glitchEffect { 0% { transform: translate(2px,0); } 50% { transform: translate(-2px,0); } 100% { transform: translate(2px,0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card" id="ui-box">
        <h1 class="logo">MAFIA ULTRA</h1>

        <div id="setupArea">
            <lottie-player src="https://assets10.lottiefiles.com/packages/lf20_m6cu98v2.json" speed="1" style="width: 150px; height: 150px; margin: 0 auto;" loop autoplay></lottie-player>
            <input type="text" id="userNameInput" placeholder="ناوەکەت بنووسە">
            <button onclick="showJoin()">چوونە ژوورەوە</button>
            <button style="background:none; border: 2px solid var(--accent); color: var(--accent);" onclick="showHost()">دروستکردنی ژوور (G.O.D)</button>
        </div>

        <div id="hostArea" class="hidden">
            <h3 style="color:var(--accent)">کۆد: <span id="roomDisplay">-</span></h3>
            <textarea id="rolesList" rows="3">مافیا، مافیا، دکتۆر، پۆلیس، هاوڵاتی، هاوڵاتی</textarea>
            <div id="playersInRoom" style="margin: 10px 0;"></div>
            <button onclick="distributeRoles()">🎲 دابەشکردن و دەستپێکردن</button>
            <button style="background: #333;" onclick="startAI()">🤖 زیادکردنی AI</button>
        </div>

        <div id="gameArea" class="hidden">
            <div id="phaseInfo" style="color:#888; font-size:14px;">قۆناغ: چاوەڕوانبە...</div>
            <div id="timerDisplay" style="font-size: 22px; color: #ff4757; margin: 10px;">30</div>
            <div id="roleDisplay" class="role-display">؟</div>
            <div id="mafiaList" style="color: #ff4757; font-size: 14px; margin-bottom: 15px;"></div>

            <div id="chatBox"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msgInput" placeholder="نامە..." style="flex:1; margin:0;">
                <button onclick="sendMsg()" style="width:60px; margin:0;">🚀</button>
            </div>

            <div id="faceOffBox" class="hidden" style="margin-top:20px; border: 1px dashed var(--accent); padding:15px; border-radius:20px;">
                <p style="font-size:12px;">کارت: فەیـس ئۆف! ڕۆڵەکەت بدە بە کەسێک:</p>
                <select id="targetSelect"></select>
                <button onclick="useFaceOff()">ناردنی ڕۆڵ</button>
            </div>

            <button id="nextBtn" class="hidden" style="margin-top:15px; background:#444;" onclick="nextPhase()">Next Phase ⏭️</button>
        </div>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = { apiKey: "AIzaSyDzASH3my7ynrQrxAL_rqVXxElL4dDcuyA", databaseURL: "https://mafia-game-57dd4-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myRoom = "", myId = "", myName = "", myRole = "", currentPhase = "Role";

// 1. HOST LOGIC
function showHost() {
    myName = userNameInput.value; if(!myName) return alert("ناو بنووسە");
    myRoom = Math.floor(1000 + Math.random() * 9000);
    roomDisplay.innerText = myRoom;
    setupArea.classList.add("hidden");
    hostArea.classList.remove("hidden");
    db.ref("rooms/" + myRoom).set({ exists: true, phase: "Role" });
    db.ref("rooms/" + myRoom + "/players").on("value", snap => {
        let h = ""; let p = snap.val() || {};
        Object.keys(p).forEach(id => { h += `<div class="player-tag">${p[id].name} <span onclick="godKill('${id}')" style="color:red;cursor:pointer">❌</span></div>`; });
        playersInRoom.innerHTML = h;
    });
}

// 2. JOIN LOGIC
function showJoin() {
    myName = userNameInput.value; if(!myName) return alert("ناو بنووسە");
    let code = prompt("کۆدی ژوور:"); if(!code) return;
    db.ref("rooms/" + code).once("value", snap => {
        if(!snap.exists()) return alert("ژوور نییە");
        myRoom = code;
        setupArea.classList.add("hidden");
        gameArea.classList.remove("hidden");
        let ref = db.ref("rooms/" + myRoom + "/players").push();
        myId = ref.key;
        ref.set({ name: myName, role: "چاوەڕوانبە...", status: "alive", isAI: false });

        db.ref("rooms/" + myRoom + "/phase").on("value", s => {
            currentPhase = s.val();
            phaseInfo.innerText = "قۆناغ: " + currentPhase;
            if(currentPhase === "Vote 🗳️") startTimer(30);
        });

        ref.on("value", s => {
            let d = s.val(); if(!d) return;
            myRole = d.role;
            if(d.status === "alive") {
                roleDisplay.innerText = d.role;
                if(d.role === "مافیا") showMafias();
            } else {
                roleDisplay.innerText = "دەرکرایت!";
                if(d.card === "فەیـس ئۆف") { faceOffBox.classList.remove("hidden"); fillTargets(); }
                else if(d.card === "بەکارهێنرا") { faceOffBox.classList.add("hidden"); roleDisplay.innerText = "ڕۆڵەکەت گواسترایەوە"; }
            }
        });
    });
}

// 3. AI SYSTEM
function startAI() {
    for(let i=0; i<3; i++) {
        let r = db.ref("rooms/" + myRoom + "/players").push();
        r.set({ name: "🤖 AI_" + Math.floor(Math.random()*99), isAI: true, role: "", status: "alive" });
    }
    alert("🤖 ٣ ڕۆبۆت هاتنە ژوورەوە!");
}

// 4. GAME FUNCTIONS
function distributeRoles() {
    let r = rolesList.value.split("،").map(x => x.trim());
    db.ref("rooms/" + myRoom + "/players").once("value", snap => {
        let ids = Object.keys(snap.val());
        let shuffled = r.sort(() => Math.random() - 0.5);
        ids.forEach((id, i) => {
            db.ref("rooms/" + myRoom + "/players/" + id).update({ role: shuffled[i] || "هاوڵاتی", status: "alive", card: "" });
        });
        db.ref("rooms/" + myRoom).update({ phase: "Night 🌙" });
        nextBtn.classList.remove("hidden");
    });
}

function godKill(id) {
    let mode = confirm("بۆ فەیـس ئۆف (OK) دابگرە، بۆ کوشتن (Cancel)");
    db.ref("rooms/" + myRoom + "/players/" + id).update({ status: "dead", card: mode ? "فەیـس ئۆف" : "" });
}

function useFaceOff() {
    let target = targetSelect.value;
    db.ref("rooms/" + myRoom + "/players/" + target).update({ role: myRole });
    db.ref("rooms/" + myRoom + "/players/" + myId).update({ card: "بەکارهێنرا" });
    glitchEffect();
}

function glitchEffect() {
    document.body.classList.add("glitch");
    setTimeout(() => document.body.classList.remove("glitch"), 500);
}

// 5. CHAT & TIMER
function sendMsg() {
    let t = msgInput.value; if(!t) return;
    db.ref("rooms/" + myRoom + "/chat").push({ user: myName, text: t });
    msgInput.value = "";
}
db.ref("rooms/" + myRoom + "/chat").on("value", snap => {
    let d = snap.val() || {}; chatBox.innerHTML = "";
    Object.keys(d).forEach(id => { chatBox.innerHTML += `<div><b>${d[id].user}:</b> ${d[id].text}</div>`; });
    chatBox.scrollTop = chatBox.scrollHeight;
});

function startTimer(s) {
    let t = s; timerDisplay.innerText = t;
    let i = setInterval(() => { t--; timerDisplay.innerText = t; if(t<=0) clearInterval(i); }, 1000);
}

function nextPhase() {
    let ps = ["Role", "Night 🌙", "Day ☀️", "Vote 🗳️"];
    let next = ps[(ps.indexOf(currentPhase) + 1) % ps.length];
    db.ref("rooms/" + myRoom).update({ phase: next });
}

function fillTargets() {
    db.ref("rooms/" + myRoom + "/players").once("value", snap => {
        let p = snap.val(); let h = "";
        Object.keys(p).forEach(id => { if(id !== myId && p[id].status === "alive") h += `<option value="${id}">${p[id].name}</option>`; });
        targetSelect.innerHTML = h;
    });
}

function showMafias() {
    db.ref("rooms/" + myRoom + "/players").once("value", snap => {
        let p = snap.val(); let m = [];
        Object.keys(p).forEach(id => { if(p[id].role === "مافیا" && id !== myId) m.push(p[id].name); });
        mafiaList.innerText = m.length > 0 ? "مافیاکان: " + m.join("، ") : "بەتەنیا مافیایت";
    });
}
</script>
</body>
</html>
