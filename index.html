<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA ULTRA - MASTER EDITION</title>

    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        :root { --accent: #00f2ff; --mafia: #ff4757; --bg: #02030a; }
        
        body { margin: 0; background: var(--bg); color: white; font-family: 'Noto Sans Arabic', sans-serif; overflow: hidden; height: 100vh; }
        .container { padding: 15px; display: flex; flex-direction: column; align-items: center; height: 100vh; box-sizing: border-box; }
        
        .main-card { 
            width: 100%; max-width: 450px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 20px; border: 1px solid #ffffff11; 
            text-align: center; height: 95vh; overflow-y: auto; position: relative;
        }

        /* 🌙 NIGHT MODE EFFECT */
        .night-theme { background: radial-gradient(circle, #0a0a2e 0%, #02030a 100%); border-color: var(--mafia); }

        .timer-badge { background: #111; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; margin-bottom: 10px; display: inline-block; }

        input, textarea, select { width: 90%; padding: 12px; margin: 5px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        
        button { 
            width: 100%; padding: 14px; margin: 5px 0; border-radius: 15px; border: none; 
            background: linear-gradient(45deg, #00f2ff, #0066ff); color: white; font-weight: 900; cursor: pointer;
        }

        .chat-area { height: 100px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 8px; font-size: 12px; border: 1px solid #222; margin: 10px 0; }
        .mafia-chat { border-color: var(--mafia); background: rgba(255, 71, 87, 0.05); }

        .vote-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .vote-btn { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; font-size: 11px; }
        .voted { border-color: var(--accent); background: #003344; }

        .player-tag { display: inline-block; padding: 8px 12px; margin: 4px; background: #111; border-radius: 12px; border: 1px solid #444; font-size: 11px; }
        .hidden { display: none; }
    </style>
</head>
<body id="gameBody">

<div class="container">
    <div class="main-card" id="mainBox">
        <div id="timerDisplay" class="timer-badge hidden">⏳ 00:00</div>
        
        <div id="setupArea">
            <h1 style="color:var(--accent)">MAFIA MASTER</h1>
            <input type="text" id="userNameInput" placeholder="ناوەکەت لێرە بنووسە">
            <button onclick="prepareJoin()">👤 چوونە ژوورەوە</button>
            <button style="background:none; border: 1px solid var(--accent); color:var(--accent)" onclick="showHost()">👑 دروستکردنی ژوور</button>
            <div id="joinFields" class="hidden">
                <input type="number" id="roomCodeInput" placeholder="کۆدی ژوور">
                <button onclick="confirmJoin()">✅ تاقیکردنەوەی چوونە ژوور</button>
            </div>
        </div>

        <div id="hostArea" class="hidden">
            <h3 id="roomDisplay">ROOM: ----</h3>
            <textarea id="rolesList">مافیا، ماتادۆر، دکتۆر، پۆلیس، هاوڵاتی، هاوڵاتی</textarea>
            <div id="playersInRoom"></div>
            <button onclick="distributeRoles()">🚀 دەستپێکردنی یاری</button>
        </div>

        <div id="gameArea" class="hidden">
            <div id="phaseInfo" style="font-weight:bold; color:var(--accent)">قۆناغ: ڕۆڵەکان</div>
            <div id="roleDisplay" style="font-size:30px; margin:10px 0; color:var(--accent)">؟</div>
            
            <div id="chatBox" class="chat-area"></div>
            <input type="text" id="msgInput" placeholder="نامە نێردراو..." onkeydown="if(event.key==='Enter')sendMsg('global')">

            <div id="mafiaChatArea" class="hidden">
                <p style="color:var(--mafia); font-size:10px; margin:5px 0;">🔴 چاتی نهێنی مافیا</p>
                <div id="mafiaChatBox" class="chat-area mafia-chat"></div>
                <input type="text" id="mafiaMsgInput" placeholder="پلانی مافیا..." onkeydown="if(event.key==='Enter')sendMsg('mafia')">
            </div>

            <div id="voteSection" class="hidden">
                <p>🗳️ دەنگ بدە بۆ دەرکردن:</p>
                <div id="voteList" class="vote-list"></div>
            </div>

            <button id="nextBtn" class="hidden" style="margin-top:15px;" onclick="manualNextPhase()">قۆناغی داهاتوو ⏭️</button>
        </div>
    </div>
</div>

<audio id="nightSound" src="https://www.soundjay.com/nature/sounds/cricket-chirp-1.mp3" loop></audio>
<audio id="bellSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyDzASH3my7ynrQrxAL_rqVXxElL4dDcuyA", 
    databaseURL: "https://mafia-game-f575f-default-rtdb.firebaseio.com/" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myRoom = "", myId = "", myName = "", myRole = "", currentPhase = "Role", isHost = false;
const mafiaRoles = ["مافیا", "ماتادۆر", "سۆلگودمان", "تێرۆریست"];

// Navigation
function prepareJoin() { if(!userNameInput.value) return; setupArea.classList.add("hidden"); joinFields.classList.remove("hidden"); }
function showHost() {
    isHost = true; myName = userNameInput.value || "Admin";
    myRoom = Math.floor(1000 + Math.random() * 8999);
    roomDisplay.innerText = "ROOM: " + myRoom;
    setupArea.classList.add("hidden"); hostArea.classList.remove("hidden");
    db.ref("rooms/" + myRoom).set({ phase: "Role", timer: 0 });
    listenPlayers();
}

function confirmJoin() {
    myRoom = roomCodeInput.value; myName = userNameInput.value;
    db.ref("rooms/" + myRoom).once("value", s => {
        if(!s.exists()) return alert("ژوور نییە!");
        setupArea.classList.add("hidden"); gameArea.classList.remove("hidden");
        let ref = db.ref("rooms/" + myRoom + "/players").push();
        myId = ref.key;
        ref.set({ name: myName, role: "چاوەڕوانبە", status: "alive" });
        syncGame();
    });
}

function syncGame() {
    db.ref("rooms/" + myRoom + "/phase").on("value", s => {
        currentPhase = s.val();
        phaseInfo.innerText = "قۆناغ: " + currentPhase;
        handlePhaseChange(currentPhase);
    });

    db.ref("rooms/" + myRoom + "/players/" + myId).on("value", s => {
        let d = s.val(); if(!d) return;
        myRole = d.role;
        roleDisplay.innerText = d.status === "dead" ? "تۆ مردوویت 💀" : d.role;
        if(mafiaRoles.includes(d.role)) mafiaChatArea.classList.remove("hidden");
    });
}

function handlePhaseChange(phase) {
    const body = document.getElementById("gameBody");
    const nightSnd = document.getElementById("nightSound");
    const bellSnd = document.getElementById("bellSound");

    if(phase.includes("Night")) {
        body.classList.add("night-theme");
        nightSnd.play();
        voteSection.classList.add("hidden");
    } else {
        body.classList.remove("night-theme");
        nightSnd.pause();
        bellSnd.play();
        if(phase === "Vote 🗳️") { voteSection.classList.remove("hidden"); renderVotes(); }
    }
}

// Host Logic
function distributeRoles() {
    let r = rolesList.value.split("،").map(x => x.trim());
    db.ref("rooms/" + myRoom + "/players").once("value", snap => {
        let ids = Object.keys(snap.val());
        let shuffled = r.sort(() => Math.random() - 0.5);
        ids.forEach((id, i) => db.ref("rooms/" + myRoom + "/players/" + id).update({ role: shuffled[i] || "هاوڵاتی", status: "alive" }));
        db.ref("rooms/" + myRoom).update({ phase: "Night 🌙" });
        if(isHost) nextBtn.classList.remove("hidden");
    });
}

// Chat System
function sendMsg(type) {
    let inp = type === 'global' ? msgInput : mafiaMsgInput;
    let path = type === 'global' ? "chat" : "mafiaChat";
    if(!inp.value) return;
    db.ref("rooms/" + myRoom + "/" + path).push({ user: myName, text: inp.value });
    inp.value = "";
}

db.ref("rooms/" + myRoom + "/chat").limitToLast(10).on("value", s => updateChat(s, "chatBox"));
db.ref("rooms/" + myRoom + "/mafiaChat").limitToLast(10).on("value", s => updateChat(s, "mafiaChatBox"));

function updateChat(s, id) {
    let box = document.getElementById(id); box.innerHTML = "";
    let d = s.val() || {};
    Object.keys(d).forEach(k => box.innerHTML += `<div><b>${d[k].user}:</b> ${d[k].text}</div>`);
    box.scrollTop = box.scrollHeight;
}

// Voting System
function renderVotes() {
    db.ref("rooms/" + myRoom + "/players").once("value", s => {
        let p = s.val(); voteList.innerHTML = "";
        Object.keys(p).forEach(id => {
            if(p[id].status === "alive") {
                voteList.innerHTML += `<div class="vote-btn" onclick="castVote('${id}')">${p[id].name}</div>`;
            }
        });
    });
}

function castVote(targetId) {
    db.ref("rooms/" + myRoom + "/votes/" + myId).set(targetId);
    alert("دەنگەکەت تۆمارکرا!");
}

function manualNextPhase() {
    let ps = ["Role", "Night 🌙", "Day ☀️", "Vote 🗳️"];
    let next = ps[(ps.indexOf(currentPhase) + 1) % ps.length];
    db.ref("rooms/" + myRoom).update({ phase: next });
}

function listenPlayers() {
    db.ref("rooms/" + myRoom + "/players").on("value", s => {
        let p = s.val() || {}; playersInRoom.innerHTML = "";
        Object.keys(p).forEach(id => playersInRoom.innerHTML += `<span class="player-tag">${p[id].name}</span>`);
    });
}
</script>
</body>
</html>
